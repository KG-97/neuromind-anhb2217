<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#09090b" />
    <meta name="description" content="ANHB2217 Interactive Neurobiology Atlas - A premium study tool for medical and neuroscience students." />
    <title>ANHB2217 | Neurobiology Master Atlas</title>
    <style>
      #splash-screen {
        position: fixed;
        inset: 0;
        background: #09090b;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      .loader {
        width: 48px;
        height: 48px;
        border: 4px solid rgba(139, 92, 246, 0.1);
        border-top-color: #8b5cf6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .loading-text {
        margin-top: 24px;
        color: #a1a1aa;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 14px;
        letter-spacing: 0.1em;
        font-weight: 600;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body class="bg-zinc-950">
    <div id="splash-screen">
      <div class="loader"></div>
      <div class="loading-text">Initializing Atlas...</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('load', () => {
        const splash = document.getElementById('splash-screen');
        setTimeout(() => {
          splash.style.opacity = '0';
          setTimeout(() => splash.remove(), 500);
        }, 800);
      });
    </script>
  </body>
</html>
